# CyHAN v2.2 - structured manifest for the POT module.
#
# Author : Norberto C. Nadal-Caraballo, PhD  <norberto.c.nadal-caraballo@usace.army.mil>

[module]
name              = "peaks_over_threshold"
short_tag         = "pot"
cyhan_version     = "v2.2"
launcher          = "run_peaks_over_threshold.py"
orchestrator      = "backend/python/api_peaks_over_threshold.py"
python_package    = "peaks_over_threshold"
cmake_flag        = "BUILD_POT"

[engine]
binding_module    = "_pot"
sources           = ["POTThresholdSearch.hpp", "pot_bindings.cpp"]
classes           = []                              # header-only; functions in namespace pot::
acceleration      = "iterative percentile threshold-search + event segmentation"

[orchestrator_entry]
config_model      = "peaks_over_threshold.config:POTConfig"
runner            = "peaks_over_threshold.orchestrator:POTOrchestrator"
entry             = "api_peaks_over_threshold:run"

[stages]
# Selectable via config["stages"]; canonical execution order. Default ["pot"].
order             = ["download", "detrend", "ntr", "pot"]
download          = "fetch NOAA water level + tide prediction CSVs (preprocessing.noaa_download)"
detrend           = "remove linear sea-level trend from water level (preprocessing.detrend)"
ntr               = "NTR = detrended water level - interpolated tide (preprocessing.ntr)"
pot               = "extract peaks over threshold (orchestrator.POTOrchestrator)"

[outputs]
# Preprocessing chain (per-gauge); paths set by the launcher. All lower case.
raw_water_level   = "data/inputs/raw/<station>/water_level_<station>.csv"
raw_tide          = "data/inputs/raw/<station>/tide_prediction_<station>.csv"
detrended_csv     = "data/inputs/processed/<station>/dwl_<station>.csv"
trend_csv         = "data/inputs/processed/<station>/trend_<station>.csv"
ntr_csv           = "data/inputs/processed/<station>/ntr_<station>.csv"
# POT extraction - the chain runs POT on BOTH processed series.
dwl_peaks_csv     = "data/outputs/<station>/dwl_<station>_pot.csv"
ntr_peaks_csv     = "data/outputs/<station>/ntr_<station>_pot.csv"
peaks_csv         = "<base>_pot.csv"     # generic form (<base> = input CSV stem)
plot              = "<base>_pot.png"
