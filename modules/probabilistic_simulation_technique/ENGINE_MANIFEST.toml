# CyHAN v2.1 - optional structured manifest for the PST module.
#
# Author / POC : Norberto C. Nadal-Caraballo, PhD  <norberto.c.nadal-caraballo@usace.army.mil>

[module]
name              = "probabilistic_simulation_technique"
short_tag         = "pst"
cyhan_version     = "v2.1"
launcher          = "run_probabilistic_simulation_technique.py"
orchestrator      = "backend/python/main_probabilistic_simulation_technique.py"
python_package    = "probabilistic_simulation_technique"
cmake_flag        = "BUILD_PST"

[engine]
binding_module    = "_pst"
sources           = ["PSTBootstrap.hpp", "pst_bindings.cpp"]
classes           = []                                # header-only; functions in namespace pst::
acceleration      = "truncated-noise bootstrap loop"

[orchestrator_entry]
config_model      = "probabilistic_simulation_technique.config:PSTConfig"
runner            = "probabilistic_simulation_technique.orchestrator:PSTOrchestrator"
entry             = "main_probabilistic_simulation_technique:run"

[inputs]
# Selected in the launcher via INPUT_MODE; main resolves the POT CSV(s).
mode_path         = "process one POT CSV at an explicit path (INPUT_CSV)"
mode_station      = "pull POT file(s) from the peaks_over_threshold outputs for a station"
station_path      = "<pot_outputs_dir>/<station>/<target>_<station>_pot.csv"
station_targets   = ["dwl", "ntr", "both"]   # both -> run PST on each

[outputs]
# <base> = POT CSV stem with its trailing token stripped, e.g. dwl_<station>.
plot              = "<base>_pst_hc.png"
qdo_diagnostics   = "<base>_qdo_threshold.png"   # QDO GPD-location (μ) selection QA
ensemble          = "<base>_pst.csv"
hc_table_be       = "<base>_pst_hc_be_tbl.csv"
hc_table_cb       = "<base>_pst_hc_cb_tbl.csv"
hc_plot_be        = "<base>_pst_hc_be_plt.csv"
hc_plot_cb        = "<base>_pst_hc_cb_plt.csv"
