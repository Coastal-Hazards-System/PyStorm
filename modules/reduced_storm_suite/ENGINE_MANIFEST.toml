# CyHAN v2.1 - structured manifest for the Reduced Storm Suite module.
#
# Author : Norberto C. Nadal-Caraballo, PhD  <norberto.c.nadal-caraballo@usace.army.mil>

[module]
name              = "reduced_storm_suite"
short_tag         = "rss"
cyhan_version     = "v2.1"
launcher          = "run_reduced_storm_suite.py"
orchestrator      = "backend/python/main_reduced_storm_suite.py"
python_package    = "reduced_storm_suite"
cmake_flag        = "BUILD_RSS"

[engine]
binding_module    = "_rss"
sources           = ["kmedoids_core.hpp", "bindings.cpp"]
classes           = []                                # header-only; functions in namespace kmedoids::
acceleration      = "PAM k-medoids (BUILD + FastPAM1 SWAP) with forced-medoid support"

[orchestrator_entry]
entry             = "main_reduced_storm_suite:run"
fixed_workflow    = "reduced_storm_suite.workflows.rss_selection:run_rss_selection"
optimal_workflow  = "reduced_storm_suite.workflows.growth_evaluation:run_growth_evaluation"

[outputs]
selected_storms       = "selected_storms.csv"
selection_metrics     = "selection_metrics.csv"         # fixed-mode
growth_history        = "growth_history.csv"            # optimal-mode
node_rmse             = "node_rmse.csv"                 # optimal-mode
alpha_beta_sweep      = "alpha_beta_sweep.csv"          # fixed-mode (optional)
qbm_bias              = "qbm_bias.h5"
hc_comparison_plot    = "hc_comparison*.png"
hc_qbm_plot           = "hc_qbm*.png"
splom_plot            = "tc_splom_*.png"
pca_yspace_plot       = "pca_yspace_*.png"
rmse_vs_k_plot        = "rmse_vs_k.png"                 # optimal-mode
bbox_map_plot         = "bbox_map.png"                  # bbox enabled
